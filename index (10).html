<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Horizon Hotel Booking Engine</title>
    <style>
        /* CSS Embedded inside HTML */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
            margin: 0;
            padding: 30px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 30px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 15px;
        }
        h1 { color: #f59e0b; margin: 0; font-size: 28px; }
        p.subtitle { color: #64748b; margin: 5px 0 0 0; font-size: 14px; }
        
        /* High-Level Booking Analytics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background-color: #111827;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .metric-card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
        .metric-card .value { font-size: 32px; font-weight: bold; color: #f8fafc; }

        /* Dashboard Split Layout Architecture */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }
        @media (max-width: 1000px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .panel {
            background-color: #111827;
            border: 1px solid #1e293b;
            padding: 25px;
            border-radius: 12px;
            height: fit-content;
        }
        h2 { margin-top: 0; font-size: 18px; color: #f59e0b; border-bottom: 1px solid #1e293b; padding-bottom: 10px; margin-bottom: 20px; }

        /* Room Catalog Grid */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .room-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s;
        }
        .room-card:hover { transform: translateY(-2px); }
        .room-card h4 { margin: 0 0 10px 0; color: #f8fafc; font-size: 18px; }
        .room-card p { color: #94a3b8; font-size: 13px; margin: 0 0 15px 0; line-height: 1.5; }
        
        .room-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .price-tag { color: #34d399; font-weight: bold; font-size: 16px; }
        .inventory-tag { color: #64748b; }
        .inventory-tag.low { color: #f87171; font-weight: bold; }

        /* Form Controls */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 13px; }
        input, select {
            width: 100%; padding: 10px; background-color: #0b0f19;
            border: 1px solid #334155; color: white; border-radius: 6px;
            box-sizing: border-box; outline: none; font-size: 14px;
        }
        
        button {
            width: 100%; padding: 12px; background-color: #f59e0b;
            color: #0b0f19; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; font-size: 14px; transition: background 0.2s;
        }
        button:hover { background-color: #d97706; }

        /* Active Reservations List */
        .booking-item {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .booking-item-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: #f8fafc;
            margin-bottom: 8px;
        }
        .booking-details { color: #94a3b8; margin-bottom: 10px; line-height: 1.4; }
        .btn-cancel {
            background-color: transparent; color: #f87171; border: 1px solid #7f1d1d;
            padding: 6px 12px; font-size: 12px; border-radius: 4px; cursor: pointer; width: auto;
        }
        .btn-cancel:hover { background-color: #7f1d1d; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Grand Horizon Resort Engine</h1>
            <p class="subtitle">Secure guest accommodations, modify active room counts, and verify physical ledger values.</p>
        </header>

        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Active Bookings</h3>
                <div class="value" id="activeBookingsCount">0</div>
            </div>
            <div class="metric-card">
                <h3>Total Gross Revenue</h3>
                <div class="value" id="grossRevenueCount" style="color: #34d399;">$0</div>
            </div>
            <div class="metric-card">
                <h3>Available Rooms Left</h3>
                <div class="value" id="totalInventoryCount" style="color: #38bdf8;">0</div>
            </div>
        </div>

        <div class="main-layout">
            <div>
                <div class="panel" style="margin-bottom: 30px; width: auto;">
                    <h2>Select Accommodation Track</h2>
                    <div class="catalog-grid" id="roomCatalogGrid">
                        </div>
                </div>

                <div class="panel" style="width: auto;">
                    <h2>Reservation Booking Form</h2>
                    <form id="bookingForm">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label for="guestName">Guest Full Name</label>
                                <input type="text" id="guestName" placeholder="e.g., Jane Doe" required>
                            </div>
                            <div class="form-group">
                                <label for="roomTypeSelect">Selected Room Category</label>
                                <select id="roomTypeSelect" required>
                                    </select>
                            </div>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="form-group">
                                <label for="checkInDate">Check-In Date</label>
                                <input type="date" id="checkInDate" required>
                            </div>
                            <div class="form-group">
                                <label for="checkOutDate">Check-Out Date</label>
                                <input type="date" id="checkOutDate" required>
                            </div>
                        </div>
                        <button type="submit">Commit Room Reservation</button>
                    </form>
                </div>
            </div>

            <div class="panel">
                <h2>Active Stay Records Ledger</h2>
                <div id="bookingsLedgerContainer">
                    </div>
            </div>
        </div>
    </div>

    <script src="hotelEngine.js"></script>
</body>
</html>
